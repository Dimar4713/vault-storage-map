name: Apply community blocker fixes

on:
  push:
    branches: [main]
    paths:
      - "tools/apply-community-blockers.mjs"
      - ".github/workflows/apply-community-blockers.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Apply blocker fixes
        run: node tools/apply-community-blockers.mjs
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Commit fixes
        run: |
          rm tools/apply-community-blockers.mjs
          rm .github/workflows/apply-community-blockers.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Obsidian Community blocking review errors"
          git push origin HEAD:main

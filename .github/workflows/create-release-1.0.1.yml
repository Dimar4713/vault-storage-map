name: Create release tag 1.0.1

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/create-release-1.0.1.yml"

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Validate version and create tag
        shell: bash
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          test "$VERSION" = "1.0.1"
          if git ls-remote --exit-code --tags origin refs/tags/1.0.1 >/dev/null 2>&1; then
            echo "Tag 1.0.1 already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a 1.0.1 -m "Vault Storage Map 1.0.1"
          git push origin 1.0.1

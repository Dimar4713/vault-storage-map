name: Publish Vault Storage Map 1.0.4

on:
  push:
    branches: [main]
    paths:
      - "tools/apply-community-cleanup-1.0.4.mjs"
      - ".github/workflows/publish-1.0.4.yml"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Apply review cleanup
        run: node tools/apply-community-cleanup-1.0.4.mjs

      - name: Regenerate lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Production build
        run: npm run build

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up Community review warnings for 1.0.4"
          git push origin HEAD:main

      - name: Attest release assets
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Publish release 1.0.4
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create 1.0.4 main.js manifest.json styles.css \
            --target "$(git rev-parse HEAD)" \
            --title "Vault Storage Map 1.0.4" \
            --notes-file RELEASE_NOTES_1.0.4.md

name: Apply community review fixes

on:
  push:
    branches: [main]
    paths:
      - "tools/apply-community-review-fixes.mjs"
      - ".github/workflows/apply-community-review-fixes.yml"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply source and release fixes
        run: node tools/apply-community-review-fixes.mjs
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Obsidian Community review findings"
          git push origin HEAD:main
      - name: Create tag
        run: |
          git tag -a 1.0.1 -m "Vault Storage Map 1.0.1"
          git push origin 1.0.1
      - name: Attest release assets
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create 1.0.1 main.js manifest.json styles.css \
            --title "1.0.1" \
            --notes-file RELEASE_NOTES_1.0.1.md

name: Publish Vault Storage Map 1.0.3

on:
  push:
    branches: [main]
    paths:
      - "tools/apply-community-blocker-fixes-1.0.3.mjs"
      - "src/electron.d.ts"
      - ".github/workflows/publish-1.0.3.yml"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Apply review fixes
        run: node tools/apply-community-blocker-fixes-1.0.3.mjs

      - name: Regenerate lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Production build
        run: npm run build

      - name: Commit review fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main.ts manifest.json versions.json package.json package-lock.json esbuild.config.mjs RELEASE_NOTES_1.0.3.md main.js
          git commit -m "Fix Obsidian Community review blocker for 1.0.3"
          git push origin HEAD:main

      - name: Attest release assets
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Publish release 1.0.3
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create 1.0.3 main.js manifest.json styles.css \
            --target "$(git rev-parse HEAD)" \
            --title "Vault Storage Map 1.0.3" \
            --notes-file RELEASE_NOTES_1.0.3.md

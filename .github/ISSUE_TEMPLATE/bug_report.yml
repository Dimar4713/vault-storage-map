name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Plugin version
    validations:
      required: true
  - type: input
    id: app
    attributes:
      label: App version and operating system
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: logs
    attributes:
      label: Relevant console output
      render: shell
